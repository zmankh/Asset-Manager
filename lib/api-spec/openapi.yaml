openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Educational Platform API - نحوي
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: grammar-rules
  - name: questions
  - name: quizzes
  - name: levels
  - name: exams
  - name: badges
  - name: leaderboard
  - name: notifications
  - name: analytics
  - name: info-cards

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /users/{userId}/streak:
    patch:
      operationId: updateStreak
      tags: [users]
      summary: Update user streak
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreakUpdate"
      responses:
        "200":
          description: Updated streak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/progress:
    get:
      operationId: getUserProgress
      tags: [users]
      summary: Get a user's level progress
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Progress entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProgress"

  /users/{userId}/badges:
    get:
      operationId: getUserBadges
      tags: [badges]
      summary: Get a user's earned badges
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Badge"

  /grammar-rules:
    get:
      operationId: listGrammarRules
      tags: [grammar-rules]
      summary: List grammar rules
      responses:
        "200":
          description: List of grammar rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrammarRule"
    post:
      operationId: createGrammarRule
      tags: [grammar-rules]
      summary: Create grammar rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrammarRuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrammarRule"

  /grammar-rules/{ruleId}:
    get:
      operationId: getGrammarRule
      tags: [grammar-rules]
      summary: Get grammar rule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Grammar rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrammarRule"
    patch:
      operationId: updateGrammarRule
      tags: [grammar-rules]
      summary: Update grammar rule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrammarRuleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrammarRule"
    delete:
      operationId: deleteGrammarRule
      tags: [grammar-rules]
      summary: Delete grammar rule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions (optionally filter by rule)
      parameters:
        - name: ruleId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /questions/bulk:
    post:
      operationId: bulkCreateQuestions
      tags: [questions]
      summary: Bulk create questions from upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkQuestionsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResult"

  /questions/{questionId}:
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Update question
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete question
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /levels:
    get:
      operationId: listLevels
      tags: [levels]
      summary: List all levels, optionally filtered by category
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [primary, middle, secondary]
      responses:
        "200":
          description: Levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Level"
    post:
      operationId: createLevel
      tags: [levels]
      summary: Create a level (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LevelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Level"

  /levels/{levelId}:
    get:
      operationId: getLevel
      tags: [levels]
      summary: Get level
      parameters:
        - name: levelId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Level"
    patch:
      operationId: updateLevel
      tags: [levels]
      summary: Update level (admin)
      parameters:
        - name: levelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LevelUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Level"
    delete:
      operationId: deleteLevel
      tags: [levels]
      summary: Delete level (admin)
      parameters:
        - name: levelId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /exams/start:
    post:
      operationId: startExam
      tags: [exams]
      summary: Start an exam for a level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamStartInput"
      responses:
        "201":
          description: Exam session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizSession"

  /exams/{sessionId}/answer:
    post:
      operationId: submitExamAnswer
      tags: [exams]
      summary: Submit an exam answer
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerInput"
      responses:
        "200":
          description: Answer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResult"

  /exams/{sessionId}/complete:
    post:
      operationId: completeExam
      tags: [exams]
      summary: Complete an exam session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamCompleteInput"
      responses:
        "200":
          description: Exam result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /quizzes/start:
    post:
      operationId: startQuiz
      tags: [quizzes]
      summary: Start a practice quiz session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizStartInput"
      responses:
        "201":
          description: Quiz session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizSession"

  /quizzes/{sessionId}/answer:
    post:
      operationId: submitAnswer
      tags: [quizzes]
      summary: Submit a practice quiz answer
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerInput"
      responses:
        "200":
          description: Answer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResult"

  /quizzes/{sessionId}/complete:
    post:
      operationId: completeQuiz
      tags: [quizzes]
      summary: Complete a practice quiz session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizCompleteInput"
      responses:
        "200":
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  /leaderboard/annual:
    get:
      operationId: getAnnualLeaderboard
      tags: [leaderboard]
      summary: Get annual leaderboard
      responses:
        "200":
          description: Annual leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  /leaderboard/weekly:
    get:
      operationId: getWeeklyLeaderboard
      tags: [leaderboard]
      summary: Get weekly leaderboard
      responses:
        "200":
          description: Weekly leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  /leaderboard/titles:
    get:
      operationId: listLeaderboardTitles
      tags: [leaderboard]
      summary: List admin-defined leaderboard titles
      responses:
        "200":
          description: Titles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardTitle"
    post:
      operationId: createLeaderboardTitle
      tags: [leaderboard]
      summary: Create leaderboard title
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaderboardTitleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardTitle"

  /leaderboard/titles/{titleId}:
    patch:
      operationId: updateLeaderboardTitle
      tags: [leaderboard]
      summary: Update leaderboard title
      parameters:
        - name: titleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaderboardTitleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardTitle"
    delete:
      operationId: deleteLeaderboardTitle
      tags: [leaderboard]
      summary: Delete leaderboard title
      parameters:
        - name: titleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
    post:
      operationId: createNotification
      tags: [notifications]
      summary: Create notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/{notificationId}:
    patch:
      operationId: updateNotification
      tags: [notifications]
      summary: Update notification
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete notification
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Get analytics overview
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /analytics/rules:
    get:
      operationId: getAnalyticsByRule
      tags: [analytics]
      summary: Get performance per grammar rule
      responses:
        "200":
          description: Analytics by rule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuleAnalytics"

  /analytics/weaknesses:
    get:
      operationId: getWeaknessAnalysis
      tags: [analytics]
      summary: Get rules with high failure rates
      responses:
        "200":
          description: Weakness analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuleAnalytics"

  /info-cards:
    get:
      operationId: listInfoCards
      tags: [info-cards]
      summary: List info cards
      responses:
        "200":
          description: Info cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InfoCard"
    post:
      operationId: createInfoCard
      tags: [info-cards]
      summary: Create info card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InfoCardInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoCard"

  /info-cards/{cardId}:
    patch:
      operationId: updateInfoCard
      tags: [info-cards]
      summary: Update info card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InfoCardUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoCard"
    delete:
      operationId: deleteInfoCard
      tags: [info-cards]
      summary: Delete info card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    GradeCategory:
      type: string
      enum: [primary, middle, secondary]

    User:
      type: object
      required: [id, email, displayName, role, xpAnnual, xpWeekly, streak, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, student]
        grade:
          type: ["string", "null"]
        gradeCategory:
          $ref: "#/components/schemas/GradeCategory"
        schoolName:
          type: ["string", "null"]
        district:
          type: ["string", "null"]
        xpAnnual:
          type: integer
        xpWeekly:
          type: integer
        streak:
          type: integer
        currentLevelId:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        photoURL:
          type: ["string", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [email, displayName, role]
      properties:
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, student]
        grade:
          type: string
        gradeCategory:
          $ref: "#/components/schemas/GradeCategory"
        schoolName:
          type: string
        district:
          type: string
        photoURL:
          type: string

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        role:
          type: string
          enum: [admin, student]
        grade:
          type: ["string", "null"]
        gradeCategory:
          $ref: "#/components/schemas/GradeCategory"
        schoolName:
          type: ["string", "null"]
        district:
          type: ["string", "null"]
        xpAnnual:
          type: integer
        xpWeekly:
          type: integer
        streak:
          type: integer
        currentLevelId:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        photoURL:
          type: ["string", "null"]

    StreakUpdate:
      type: object
      required: [streak]
      properties:
        streak:
          type: integer

    UserProgress:
      type: object
      required: [id, userId, levelId, passed, score, completedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        levelId:
          type: string
        levelTitle:
          type: string
        passed:
          type: boolean
        score:
          type: integer
        attempts:
          type: integer
        completedAt:
          type: string

    Badge:
      type: object
      required: [id, userId, ruleId, ruleTitle, earnedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        ruleId:
          type: string
        ruleTitle:
          type: string
        levelId:
          type: ["string", "null"]
        levelTitle:
          type: ["string", "null"]
        earnedAt:
          type: string

    Level:
      type: object
      required: [id, title, order, categories, ruleId, passingScore, questionCount, active, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        order:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/GradeCategory"
        ruleId:
          type: string
        ruleTitle:
          type: ["string", "null"]
        passingScore:
          type: integer
        questionCount:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string

    LevelInput:
      type: object
      required: [title, order, categories, ruleId, passingScore, questionCount]
      properties:
        title:
          type: string
        description:
          type: string
        order:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/GradeCategory"
        ruleId:
          type: string
        passingScore:
          type: integer
        questionCount:
          type: integer
        active:
          type: boolean

    LevelUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        order:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/GradeCategory"
        ruleId:
          type: string
        passingScore:
          type: integer
        questionCount:
          type: integer
        active:
          type: boolean

    GrammarRule:
      type: object
      required: [id, title, description, explanation, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        explanation:
          type: string
        questionCount:
          type: integer
        createdAt:
          type: string

    GrammarRuleInput:
      type: object
      required: [title, description, explanation]
      properties:
        title:
          type: string
        description:
          type: string
        explanation:
          type: string

    GrammarRuleUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        explanation:
          type: string

    Question:
      type: object
      required: [id, ruleId, questionText, options, correctAnswer, createdAt]
      properties:
        id:
          type: string
        ruleId:
          type: string
        questionText:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
        hint:
          type: ["string", "null"]
        createdAt:
          type: string

    QuestionInput:
      type: object
      required: [ruleId, questionText, options, correctAnswer]
      properties:
        ruleId:
          type: string
        questionText:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
        hint:
          type: string

    QuestionUpdate:
      type: object
      properties:
        questionText:
          type: string
